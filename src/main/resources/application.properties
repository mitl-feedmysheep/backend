spring.application.name=IntoTheHeaven

# === Datasource (MySQL) ===
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# === JPA settings ===
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# === UUID / JDBC optimization ===
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.default_batch_fetch_size=1000

# === View / Timezone ===
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=Asia/Seoul

# === JWT ===
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS:31536000}

# === Devtools ===
spring.devtools.restart.enabled=true
spring.devtools.restart.exclude=static/**,public/**

# === AWS SES ===
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.ses.region=${AWS_SES_REGION:ap-northeast-2}

# === Mail provider selection (ses | gmail) ===
mail.provider=${MAIL_PROVIDER:gmail}

# === Gmail SMTP ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.from=${MAIL_FROM:}
mail.reply-to=${MAIL_REPLY_TO:}

# === Cloudflare R2 ===
cloudflare.r2.access-key-id=${CLOUDFLARE_R2_ACCESS_KEY_ID:}
cloudflare.r2.secret-access-key=${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME:}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:}
cloudflare.r2.public-domain=${CLOUDFLARE_R2_PUBLIC_DOMAIN:}

# === Server (production overrides via env) ===
server.port=${SERVER_PORT:8080}
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:false}
server.compression.mime-types=application/json,application/javascript,text/html,text/plain
server.compression.min-response-size=1KB

# === Actuator (Monitoring) ===
management.endpoints.web.exposure.include=health,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
